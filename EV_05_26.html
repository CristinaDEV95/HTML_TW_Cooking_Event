<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Finder with Stock</title>

  <link rel="stylesheet" href="style.css" />

</head>
<body id="page-event-04">
<header id="guide-banner" class="glass-header">
  <img src="img_header/4_The_Culinary_Crucible_-_Carp-e_Diem.webp" class="header-banner" alt="">
</header>

  <main id="guide-main">
    <h1 id="guide-page-title">Recipe Finder</h1>

    <section id="guide-events" class="events-section" aria-labelledby="events-heading">
      <h2 id="events-heading">Culinary Crucible events</h2>
      <div id="eventsGrid" class="events-grid"></div>
    </section>

    <section id="guide-ingredients" aria-labelledby="stock-intro">
      <p id="stock-intro">Select ingredients and set your stock quantity:</p>
      <div id="ingredientList" class="ingredients"></div>
    </section>

    <section id="guide-recipes" aria-labelledby="recipes-heading">
      <h2 id="recipes-heading">Recipes</h2>
      <div id="recipesOutput"></div>
    </section>
  </main>
  

<script src="ingredients.js"></script>
<script src="events.js"></script>
<script src="script.js"></script>

</body>
</html>
